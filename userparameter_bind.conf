# Zabbix UserParameters for BIND9 (named)
# Author: Vasilii Zakharov <vasiliiazakharov@gmail.com>
# License: MIT
#
# Two data sources are supported, BIND statistics-channels (HTTP/JSON) and
# rndc stats. Default is HTTP/JSON. Override the URL with macro
# {$ZBX.BIND.STATS_URL} or pass explicit URL via $1.

# Master raw item — query the JSON statistics-channel
UserParameter=bind.stats.json[*],/usr/local/bin/zbx_bind_stats.sh json "$1"

# Query types (per-second rates are computed in Zabbix preprocessing)
UserParameter=bind.queries.IN.A,/usr/local/bin/zbx_bind_stats.sh qtype A
UserParameter=bind.queries.IN.AAAA,/usr/local/bin/zbx_bind_stats.sh qtype AAAA
UserParameter=bind.queries.IN.MX,/usr/local/bin/zbx_bind_stats.sh qtype MX
UserParameter=bind.queries.IN.TXT,/usr/local/bin/zbx_bind_stats.sh qtype TXT
UserParameter=bind.queries.IN.PTR,/usr/local/bin/zbx_bind_stats.sh qtype PTR
UserParameter=bind.queries.total,/usr/local/bin/zbx_bind_stats.sh qtotal

# Response codes
UserParameter=bind.responses.NOERROR,/usr/local/bin/zbx_bind_stats.sh rcode NOERROR
UserParameter=bind.responses.NXDOMAIN,/usr/local/bin/zbx_bind_stats.sh rcode NXDOMAIN
UserParameter=bind.responses.SERVFAIL,/usr/local/bin/zbx_bind_stats.sh rcode SERVFAIL
UserParameter=bind.responses.REFUSED,/usr/local/bin/zbx_bind_stats.sh rcode REFUSED

# Cache hit rate (computed)
UserParameter=bind.cache.hitrate,/usr/local/bin/zbx_bind_stats.sh hitrate

# Zone discovery + zone serial
UserParameter=bind.zone.discovery,/usr/local/bin/zbx_bind_zones.sh discovery
UserParameter=bind.zone.serial[*],/usr/local/bin/zbx_bind_zones.sh serial "$1"
